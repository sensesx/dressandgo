<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DRESS &amp; GO — Meus Pedidos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="/css/loja.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="/">DRESS<em>&</em>GO</a>
  <div class="d-flex gap-2">
    <a href="/perfil" class="btn btn-outline-light btn-sm">Perfil</a>
    <button class="btn btn-outline-secondary btn-sm" onclick="sair()">Sair</button>
  </div>
</nav>

<div class="container py-4" style="max-width:800px">
  <h2 class="fw-bold mb-4">MEUS PEDIDOS</h2>
  <div id="lista"><div class="text-secondary small">Carregando...</div></div>
  <div id="cancelados-section" class="mt-3" style="display:none">
    <button class="btn btn-sm btn-outline-secondary mb-2" onclick="toggleCancelados()">Ver cancelados</button>
    <div id="cancelados-lista"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/loja.js"></script>
<script>
if (!token()) location.href = '/account/cliente?next=/pedidos';

const labels = {criado:'Criado',aguardando:'Aguard. Pagamento',pago:'Processando',finalizado:'Finalizado',cancelado:'Cancelado'};
const cores   = {criado:'secondary',aguardando:'warning',pago:'info',finalizado:'info',cancelado:'danger'};

window.addEventListener('load', carregar);

async function carregar() {
  try {
    const todos = await req('GET', '/orders');
    const ativos = todos.filter(p => p.status !== 'cancelado');
    const canc   = todos.filter(p => p.status === 'cancelado');
    document.getElementById('lista').innerHTML = ativos.length ? ativos.map(renderPedido).join('') : '<p class="text-secondary">Nenhum pedido.</p>';
    if (canc.length) {
      document.getElementById('cancelados-section').style.display = '';
      document.getElementById('cancelados-lista').dataset.lista = JSON.stringify(canc);
    }
  } catch(e) { document.getElementById('lista').innerHTML = '<p class="text-danger">'+e.message+'</p>'; }
}

function renderPedido(p) {
  const podeCanc = ['criado','reservado','aguardando'].includes(p.status);
  return '<div class="card mb-3"><div class="card-body">'
    + '<div class="d-flex justify-content-between align-items-start mb-2">'
    + '<div><h6 class="fw-bold mb-0">Pedido #'+p.id+'</h6><p class="text-secondary small mb-0">'+fmtData(p.createdAt)+'</p></div>'
    + '<span class="text-'+cores[p.status]+' small">'+labels[p.status]+'</span>'
    + '</div>'
    + '<div class="d-flex justify-content-between align-items-center">'
    + '<span class="text-secondary small">'+p.itemCount+' item(s)</span>'
    + '<div class="d-flex gap-2 align-items-center">'
    + (podeCanc ? '<button class="btn btn-sm btn-outline-danger" onclick="cancelar('+p.id+')">Cancelar</button>' : '')
    + '<strong class="text-primary">R$ '+p.total.toFixed(2)+'</strong>'
    + '</div></div></div></div>';
}

async function cancelar(id) {
  if (!confirm('Cancelar este pedido?')) return;
  try { await req('PATCH', '/orders/'+id+'/status', {status:'cancelado'}); toast('Pedido cancelado.'); carregar(); }
  catch(e) { toast(e.message,'danger'); }
}

let cancelVis = false;
function toggleCancelados() {
  cancelVis = !cancelVis;
  const el = document.getElementById('cancelados-lista');
  el.innerHTML = cancelVis ? JSON.parse(el.dataset.lista||'[]').map(p => renderPedido(p)).join('') : '';
}

function fmtData(d) {
  if (!d) return '—';
  return new Date(d.replace(' ','T')+'Z').toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
</script>
</body>
</html>
