<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DRESS &amp; GO — Criar conta</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="/css/loja.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3">
  <a class="navbar-brand fw-bold" href="/">DRESS<em class="text-primary">&</em>GO</a>
</nav>

<div class="container py-5" style="max-width:640px">
  <h2 class="fw-bold mb-1">Criar conta</h2>
  <p class="text-secondary mb-4">Já tem conta? <a href="/account/cliente" class="text-primary">Entrar</a></p>

  <div class="card">
    <div class="card-body p-4">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nome completo *</label>
          <input type="text" id="nome" class="form-control" autocomplete="off">
        </div>
        <div class="col-md-6">
          <label class="form-label">CPF</label>
          <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" maxlength="14" oninput="mskCpf(this)" autocomplete="off">
        </div>
        <div class="col-md-6">
          <label class="form-label">Telefone</label>
          <input type="text" id="tel" class="form-control" placeholder="(11) 99999-9999" maxlength="15" oninput="mskTel(this)" autocomplete="off">
        </div>
        <div class="col-md-6">
          <label class="form-label">E-mail *</label>
          <input type="text" id="email" class="form-control" autocomplete="off">
        </div>
        <div class="col-md-6">
          <label class="form-label">Senha *</label>
          <input type="password" id="pass" class="form-control" placeholder="Mínimo 6 caracteres" autocomplete="off">
        </div>
        <div class="col-md-6">
          <label class="form-label">Confirmar senha *</label>
          <input type="password" id="pass2" class="form-control" autocomplete="off">
        </div>

        <div class="col-12"><hr class="border-secondary"><h6 class="fw-bold mb-0">Endereço</h6></div>

        <div class="col-md-4">
          <label class="form-label">CEP *</label>
          <input type="text" id="cep" class="form-control" placeholder="00000-000" maxlength="9" oninput="mskCep(this)" autocomplete="off">
        </div>
        <div class="col-12">
          <label class="form-label">Rua *</label>
          <input type="text" id="rua" class="form-control" autocomplete="off">
        </div>
        <div class="col-4">
          <label class="form-label">Número *</label>
          <input type="text" id="num" class="form-control" autocomplete="off">
        </div>
        <div class="col-8">
          <label class="form-label">Complemento</label>
          <input type="text" id="comp" class="form-control" autocomplete="off">
        </div>
        <div class="col-5">
          <label class="form-label">Bairro *</label>
          <input type="text" id="bairro" class="form-control" autocomplete="off">
        </div>
        <div class="col-5">
          <label class="form-label">Cidade *</label>
          <input type="text" id="cidade" class="form-control" autocomplete="off">
        </div>
        <div class="col-2">
          <label class="form-label">Estado *</label>
          <input type="text" id="estado" class="form-control" maxlength="2" autocomplete="off">
        </div>

        <div class="col-12">
          <div id="err" class="text-danger small mb-2" style="display:none"></div>
          <div id="ok" class="text-success small mb-2" style="display:none">Conta criada! Redirecionando...</div>
          <button id="btncad" class="btn btn-primary w-100" onclick="cadastrar()">CRIAR MINHA CONTA</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function mskCpf(el){let v=el.value.replace(/\D/g,'').slice(0,11);if(v.length>9)v=v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/,'$1.$2.$3-$4');else if(v.length>6)v=v.replace(/(\d{3})(\d{3})(\d{0,3})/,'$1.$2.$3');else if(v.length>3)v=v.replace(/(\d{3})(\d{0,3})/,'$1.$2');el.value=v;}
function mskTel(el){let v=el.value.replace(/\D/g,'').slice(0,11);if(v.length>6)v=v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3');else if(v.length>2)v=v.replace(/(\d{2})(\d{0,5})/,'($1) $2');el.value=v;}
function mskCep(el){
  let v=el.value.replace(/\D/g,'').slice(0,8);
  if(v.length>5)v=v.replace(/(\d{5})(\d{0,3})/,'$1-$2');
  el.value=v;
  if(v.replace('-','').length===8) viaCep(v.replace('-',''));
}
async function viaCep(cep){
  try{const d=await fetch('https://viacep.com.br/ws/'+cep+'/json/').then(r=>r.json());if(d.erro)return;
    const s=(id,v)=>{const e=document.getElementById(id);if(e&&v&&!e.value)e.value=v;};
    s('rua',d.logradouro);s('bairro',d.bairro);s('cidade',d.localidade);s('estado',d.uf);
    document.getElementById('num').focus();}catch{}
}

document.getElementById('estado').addEventListener('keydown', e => e.key==='Enter' && cadastrar());

async function cadastrar() {
  const btn=document.getElementById('btncad');
  const err=document.getElementById('err');
  const ok=document.getElementById('ok');
  err.style.display='none'; ok.style.display='none';

  const nome  = document.getElementById('nome').value.trim();
  const cpf   = document.getElementById('cpf').value.replace(/\D/g,'');
  const tel   = document.getElementById('tel').value.replace(/\D/g,'');
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  const cep   = document.getElementById('cep').value.replace(/\D/g,'');
  const rua   = document.getElementById('rua').value.trim();
  const num   = document.getElementById('num').value.trim();
  const comp  = document.getElementById('comp').value.trim();
  const bairro= document.getElementById('bairro').value.trim();
  const cidade= document.getElementById('cidade').value.trim();
  const estado= document.getElementById('estado').value.trim().toUpperCase();

  const e = (m) => { err.textContent=m; err.style.display='block'; };
  if (!nome)          return e('Nome obrigatório.');
  if (!email.includes('@')) return e('E-mail inválido.');
  if (pass.length<6)  return e('Senha deve ter ao menos 6 caracteres.');
  if (pass!==pass2)   return e('As senhas não conferem.');
  if (!rua)           return e('Rua obrigatória.');
  if (!cidade)        return e('Cidade obrigatória.');

  btn.disabled=true; btn.textContent='CRIANDO...';
  try {
    const r = await fetch('/api/cadastro',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:nome,email,password:pass,phone:tel||null})
    });
    let d; try{d=await r.json();}catch{d={};}
    if(!r.ok){btn.disabled=false;btn.textContent='CRIAR MINHA CONTA';return e(d.erro||d.error||'Erro ao criar conta.');}

    const lr = await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    let ld; try{ld=await lr.json();}catch{ld={};}
    if(lr.ok){
      sessionStorage.setItem('dg_token',ld.token);
      sessionStorage.setItem('dg_role',ld.role);
      sessionStorage.setItem('dg_name',ld.name);
      sessionStorage.setItem('dg_uid',ld.userId);
      try{await fetch('/users/'+ld.userId+'/addresses',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ld.token},body:JSON.stringify({label:'Principal',cep,street:rua,number:num||'s/n',complement:comp||null,district:bairro,city:cidade,state:estado||'SP'})});}catch{}
    }
    ok.style.display='block';
    setTimeout(()=>location.href=new URLSearchParams(location.search).get('next')||'/',1400);
  } catch(ex) { btn.disabled=false; btn.textContent='CRIAR MINHA CONTA'; e('Erro de conexão. Verifique se o servidor está rodando.'); }
}
</script>
</body>
</html>
