<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DRESS &amp; GO — Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="/css/loja.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
<div class="card" style="width:360px">
  <div class="card-body p-4">
    <a class="navbar-brand d-block mb-3" href="/">DRESS<em>&</em>GO</a>
    <h5 class="fw-bold mb-1">Painel Administrativo</h5>
    <div class="mb-3">
      <label class="form-label">E-mail</label>
      <input type="text" id="email" class="form-control" placeholder="" autocomplete="off">
    </div>
    <div class="mb-3">
      <label class="form-label">Senha</label>
      <input type="password" id="pass" class="form-control" placeholder="••••••" autocomplete="off">
    </div>
    <div id="err" class="text-danger small mb-2" style="display:none"></div>
    <button class="btn btn-primary w-100" onclick="login()">ENTRAR</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/loja.js"></script>
<script>
document.getElementById('pass').addEventListener('keydown', e => e.key==='Enter' && login());
async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const err   = document.getElementById('err');
  err.style.display = 'none';
  try {
    const d = await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})})
      .then(async r => { const j=await r.json(); if(!r.ok) throw new Error(j.erro||'Erro'); return j; });
    if (d.role !== 'manager') throw new Error('Acesso negado.');
    sessionStorage.setItem('dg_token',d.token); sessionStorage.setItem('dg_role',d.role);
    sessionStorage.setItem('dg_name',d.name); sessionStorage.setItem('dg_uid',d.userId);
    location.href = '/account/wp-admin/dashboard/';
  } catch(e) { err.textContent=e.message; err.style.display=''; }
}
</script>
</body>
</html>
